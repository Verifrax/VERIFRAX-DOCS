name: pages
on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build marker
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f 404.html
          echo "build: ok"
  deploy:
    if: github.event_name == push && github.ref == refs/heads/main
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy marker
        shell: bash
        run: |
          set -euo pipefail
          echo "deploy: ok"
